name: 🛡️ Radio Park FM - BACKUP PROCESS

on:
  workflow_dispatch: # Uruchamiane wyłącznie przez API z poziomu głównego procesu

jobs:
  backup-record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-logger-backup
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget lsb-release
          UBUNTU=$(lsb_release -rs)
          wget -q -O /tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_${UBUNTU}/amd64/megacmd-xUbuntu_${UBUNTU}_amd64.deb \
            || wget -q -O /tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /tmp/megacmd.deb

      - name: Recorder (BACKUP PROCESS)
        run: |
          set -euo pipefail
          export TZ=Europe/Warsaw

          mkdir -p nagrania_backup
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          
          # Zgodnie z Twoją intencją: proces zapasowy nagrywa 1h 20m (4800 sekund)
          END=$(( $(date +%s) + 4800 )) 

          echo "[BACKUP] Uruchomiono awaryjną rejestrację na czas 1h 20m..."

          while [ "$(date +%s)" -lt "$END" ]; do
            REM=$((END-$(date +%s)))
            [ "$REM" -le 5 ] && break
            CHUNK=1800
            [ "$REM" -lt 1800 ] && CHUNK=$REM
          
            ffmpeg -y -loglevel error \
              -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -reconnect 1 \
              -reconnect_streamed 1 \
              -reconnect_at_eof 1 \
              -reconnect_on_network_error 1 \
              -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK" -c:a copy \
              "nagrania_backup/Radio_$(date +%F_%H-%M-%S)_BACKUP.mp3" || true
          
            sleep $((RANDOM%5+2))
          done

      - name: Upload Backup to MEGA
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania || true

          shopt -s nullglob
          for file in nagrania_backup/*.mp3; do
            if [ -f "$file" ]; then
              echo "Uploading Backup: $file..."
              mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Upload failed for $file, skipping."
            fi
          done
          mega-logout > /dev/null