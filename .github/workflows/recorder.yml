name: Radio Park FM - ULTIMATE LOGGER (DYNAMIC)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Całkowity czas nagrywania (w sekundach)'
        required: false
        default: '10800'
      chunk:
        description: 'Długość jednego segmentu (w sekundach)'
        required: false
        default: '1800'
      retry_count:
        description: 'Aktualny numer próby restartu (wewnętrzne przekazywanie)'
        required: false
        default: '0'

# Wymagane uprawnienia dla narzędzia GitHub CLI (gh), aby móc wywołać kolejny bieg workflow
permissions:
  actions: write
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-park-logger-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Smart recorder (MAIN PROCESS)
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"
          
          mkdir -p nagrania
          mkdir -p logi

          # --- INICJACJA ZBIORCZEGO PLIKU HISTORII Z DATĄ I GODZINĄ ---
          LOG_TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          HISTORIA="logi/historia_dzialania_${LOG_TIMESTAMP}.log"
          
          echo "=== START WORKFLOW: $(date '+%Y-%m-%d %H:%M:%S') ===" > "$HISTORIA"
          echo "Bieżący numer próby (retry_count): ${{ github.event.inputs.retry_count || '0' }}" >> "$HISTORIA" 2>&1
          
          # Logowanie do MEGA z zapisem wyniku do pliku historii
          echo "[$(date +'%H:%M:%S')] Próba logowania do MEGA..." >> "$HISTORIA" 2>&1
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" >> "$HISTORIA" 2>&1
          mega-mkdir /Radio_Nagrania >> "$HISTORIA" 2>&1 || true
          mega-mkdir /Radio_Nagrania/Radio_Logi >> "$HISTORIA" 2>&1 || true
          
          DURATION="${{ github.event.inputs.duration || '10800' }}"
          DEFAULT_CHUNK="${{ github.event.inputs.chunk || '1800' }}"
          
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + DURATION))
          i=0

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            CURRENT_TIME=$(date +%s)
            [ $((END_TIME - CURRENT_TIME)) -le 30 ] && break

            i=$((i + 1))
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            FILE="nagrania/Radio_${TIMESTAMP}.mp3"
            LOG_FILE="logi/Log_MAIN_${i}_${TIMESTAMP}.txt"

            REMAINING_TIME=$((END_TIME - CURRENT_TIME))
            CHUNK_TIME=$(( REMAINING_TIME < DEFAULT_CHUNK ? REMAINING_TIME : DEFAULT_CHUNK ))

            echo "[$(date +'%H:%M:%S')] Rozpoczynanie segmentu $i (max: ${CHUNK_TIME}s) -> $FILE" >> "$HISTORIA" 2>&1

            # Uruchomienie ffmpeg z zapisem logów i błędów (2>&1) do dedykowanego pliku segmentu
            ffmpeg -y -hide_banner -loglevel warning -user_agent "Mozilla/5.0" \
              -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK_TIME" -c:a copy "$FILE" >"$LOG_FILE" 2>&1 &
          
            FFMPEG_PID=$!
            START_SEGMENT=$(date +%s)
            LAST_SIZE=0
            LAST_ACTIVE=$(date +%s)
            TICK=0

            while kill -0 "$FFMPEG_PID" 2>/dev/null; do
              NOW=$(date +%s)
          
              if [ $((NOW - START_SEGMENT)) -ge "$CHUNK_TIME" ]; then
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                break
              fi

              CURRENT_SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          
              if [ "$CURRENT_SIZE" -gt "$LAST_SIZE" ]; then
                LAST_SIZE=$CURRENT_SIZE
                LAST_ACTIVE="$NOW"
                TICK=$((TICK + 1))
                if [ $((TICK % 10)) -eq 0 ]; then
                  MBS=$(( CURRENT_SIZE / 1048576 ))
                  echo "[$(date +'%H:%M:%S')] Nagrywanie w toku, segment $i (rozmiar: $MBS MB)" | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
                fi
              elif [ $((NOW - LAST_ACTIVE)) -ge 180 ]; then
                echo "[$(date +'%H:%M:%S')] Brak danych przez 3 min! Restart procesu..." | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                sleep 10
                kill -9 "$FFMPEG_PID" 2>/dev/null || true
                break
              fi
              sleep 30
            done
          
            if wait "$FFMPEG_PID"; then
              STATUS="OK"
              echo "[$(date +'%H:%M:%S')] Segment $i zakończony poprawnie." | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
            else
              EXIT_CODE=$?
              STATUS="ERROR ($EXIT_CODE)"
              echo "[$(date +'%H:%M:%S')] ffmpeg zakończył się błędem (kod: $EXIT_CODE)." | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
            fi
          
            if [ -f "$FILE" ] && [ ! -s "$FILE" ]; then
              echo "[$(date +'%H:%M:%S')] Usuwam pusty plik: $FILE" | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
              rm -f "$FILE"
            fi
          
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          
            echo "==================================================" | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
            echo "Segment: $i | Status: $STATUS | Rozmiar: $SIZE B" | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1
            echo "==================================================" | tee -a "$LOG_FILE" >> "$HISTORIA" 2>&1

            # --- BIEŻĄCA WYSYŁKA NA MEGA + ZAPIS DO HISTORII ---
            mega-session > /dev/null 2>&1 || mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" >> "$HISTORIA" 2>&1

            if [ -f "$FILE" ] && [ "$SIZE" -gt 50000 ]; then
              echo "[$(date +'%H:%M:%S')] [MEGA] Wysyłam segment $i..." >> "$HISTORIA" 2>&1
              mega-put "$FILE" /Radio_Nagrania/ >> "$HISTORIA" 2>&1 || echo "Błąd wysyłania mp3" >> "$HISTORIA" 2>&1
              rm -f "$FILE"
            fi

            if [ -f "$LOG_FILE" ]; then
              mega-put "$LOG_FILE" /Radio_Nagrania/Radio_Logi/ >> "$HISTORIA" 2>&1
            fi
          
            # Aktualizacja pliku zbiorczego na MEGA po każdym zakończonym kroku
            echo "[$(date +'%H:%M:%S')] [MEGA] Aktualizacja zbiorczego pliku historii działania..." >> "$HISTORIA" 2>&1
            mega-put -c "$HISTORIA" /Radio_Nagrania/Radio_Logi/ >> /dev/null 2>&1 || mega-put "$HISTORIA" /Radio_Nagrania/Radio_Logi/ >> /dev/null 2>&1
          
            sleep 2
          done

          echo "=== KONIEC PRACY WORKFLOW: $(date '+%Y-%m-%d %H:%M:%S') ===" >> "$HISTORIA" 2>&1
          mega-logout >> "$HISTORIA" 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nagrania-tymczasowe
          path: |
            nagrania/
            logi/
          retention-days: 2

      # Krok Fallback: Bezpiecznik końcowy na wypadek prawidłowego wyjścia z pętli głównej
      - name: Upload to MEGA (Fallback)
        if: always()
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-session > /dev/null 2>&1 || mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          
          mega-mkdir /Radio_Nagrania || true
          mega-mkdir /Radio_Nagrania/Radio_Logi || true
          
          if [ -d "nagrania" ]; then
            for file in nagrania/*.mp3; do
              if [ -f "$file" ] && [ "$(stat -c%s "$file")" -gt 50000 ]; then
                echo "Uploading recording (fallback): $file..."
                mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
          fi
          
          if [ -d "logi" ]; then
            for file in logi/*.txt; do
              if [ -f "$file" ]; then
                echo "Uploading log (fallback): $file..."
                mega-put "$file" /Radio_Nagrania/Radio_Logi/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
            # Ostateczne wysłanie dynamicznego pliku historii przy użyciu dopasowania wzorca (wildcard)
            for h_file in logi/historia_dzialania_*.log; do
              if [ -f "$h_file" ]; then
                mega-put -c "$h_file" /Radio_Nagrania/Radio_Logi/ > /dev/null 2>&1 || true
              fi
            done
          fi
          
          mega-logout > /dev/null || true

  # --- AUTOMATYCZNY RESTART W PRZYPADKU AWARII RUNNERA ---
  restart-on-failure:
    runs-on: ubuntu-latest
    needs: record
    if: failure()
    steps:
      - name: Wait for 1 minute before retry
        run: |
          echo "Wykryto awarię głównego zadania nagrywającego."
          echo "Oczekiwanie 60 sekund przed próbą ponownego uruchomienia..."
          sleep 60

      # Instalujemy MEGA CMD na nowej maszynie, aby móc wysłać raport o awarii bezpośrednio do chmury
      - name: Install MEGA CMD for error logging
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Check retry limit, log error to MEGA and trigger new run
        env:
          GH_TOKEN: ${{ github.token }}
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"

          CURRENT_RETRY="${{ github.event.inputs.retry_count || '0' }}"
          MAX_RETRIES=3

          # --- GENEROWANIE PLIKU BŁĘDU Z DATĄ I GODZINĄ ---
          mkdir -p logi_awarii
          FAIL_TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          FAIL_FILE="logi_awarii/Awaria_Park_${FAIL_TIMESTAMP}.log"

          echo "==================================================" > "$FAIL_FILE"
          echo "RAPORT O AWARII WORKFLOW: Radio Park FM" >> "$FAIL_FILE"
          echo "Data i godzina wykrycia: $(date '+%Y-%m-%d %H:%M:%S')" >> "$FAIL_FILE"
          echo "Status: Główny proces nagrywania (record) zakończył się niepowodzeniem." >> "$FAIL_FILE"
          echo "ID nieudanego uruchomienia: ${{ github.run_id }}" >> "$FAIL_FILE"
          echo "Link do logów GitHub: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$FAIL_FILE"
          echo "Numer próby, przy której wystąpił błąd: $CURRENT_RETRY" >> "$FAIL_FILE"
          echo "==================================================" >> "$FAIL_FILE"

          # Wysyłka pliku raportu na MEGA
          echo "Logowanie do MEGA w celu zapisu raportu awarii..."
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania/Radio_Logi || true
          mega-put "$FAIL_FILE" /Radio_Nagrania/Radio_Logi/
          mega-logout > /dev/null || true
          # ------------------------------------------------

          echo "Bieżąca liczba wykonanych restartów: $CURRENT_RETRY z maksymalnie $MAX_RETRIES"

          if [ "$CURRENT_RETRY" -ge "$MAX_RETRIES" ]; then
            echo "Osiągnięto limit prób ($MAX_RETRIES). Przerywam automatyczne wznawianie."
            exit 0
          fi

          NEXT_RETRY=$((CURRENT_RETRY + 1))
          echo "Inicjowanie automatycznego restartu (Próba nr $NEXT_RETRY)..."
          
          gh workflow run recorder.yml \
            -f duration="${{ github.event.inputs.duration || '10800' }}" \
            -f chunk="${{ github.event.inputs.chunk || '1800' }}" \
            -f retry_count="$NEXT_RETRY"

          echo "Nowy proces workflow został zakolejkowany."