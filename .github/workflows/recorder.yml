name: Radio Park FM - ULTIMATE LOGGER (DYNAMIC)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Całkowity czas nagrywania (w sekundach)'
        required: false
        default: '10800'
      chunk:
        description: 'Długość jednego segmentu (w sekundach)'
        required: false
        default: '1800'

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-park-logger-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Smart recorder (MAIN PROCESS)
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"
          
          DURATION="${{ github.event.inputs.duration || '10800' }}"
          DEFAULT_CHUNK="${{ github.event.inputs.chunk || '1800' }}"
          
          mkdir -p nagrania
          mkdir -p logi
          
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + DURATION))
          i=0

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            CURRENT_TIME=$(date +%s)
            [ $((END_TIME - CURRENT_TIME)) -le 30 ] && break

            i=$((i + 1))
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            FILE="nagrania/Radio_${TIMESTAMP}.mp3"
            LOG_FILE="logi/Log_MAIN_${i}_${TIMESTAMP}.txt"

            REMAINING_TIME=$((END_TIME - CURRENT_TIME))
            CHUNK_TIME=$(( REMAINING_TIME < DEFAULT_CHUNK ? REMAINING_TIME : DEFAULT_CHUNK ))

            echo "Segment $i -> $FILE (czas: ${CHUNK_TIME}s)"

            # Uruchomienie ffmpeg z limitem czasu -t
            ffmpeg -y -hide_banner -loglevel warning -user_agent "Mozilla/5.0" \
              -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK_TIME" -c:a copy "$FILE" >"$LOG_FILE" 2>&1 &
          
            FFMPEG_PID=$!
            START_SEGMENT=$(date +%s)
            LAST_SIZE=0
            LAST_ACTIVE=$(date +%s)
            TICK=0 

            while kill -0 "$FFMPEG_PID" 2>/dev/null; do
              NOW=$(date +%s)
          
              if [ $((NOW - START_SEGMENT)) -ge "$CHUNK_TIME" ]; then
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                break
              fi

              CURRENT_SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          
              if [ "$CURRENT_SIZE" -gt "$LAST_SIZE" ]; then
                LAST_SIZE=$CURRENT_SIZE
                LAST_ACTIVE="$NOW"
                TICK=$((TICK + 1))
                if [ $((TICK % 10)) -eq 0 ]; then
                  echo "[$(date +'%H:%M:%S')] Nagrywanie w toku, segment $i (rozmiar: $CURRENT_SIZE B)" | tee -a "$LOG_FILE"
                fi
              elif [ $((NOW - LAST_ACTIVE)) -ge 180 ]; then
                echo "[$(date +'%H:%M:%S')] Brak danych przez 3 min! Restart procesu..." | tee -a "$LOG_FILE"
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                sleep 5
                kill -9 "$FFMPEG_PID" 2>/dev/null || true
                break
              fi
              sleep 30
            done
            wait "$FFMPEG_PID" 2>/dev/null || true
            sleep 2
          done

      - name: Upload to MEGA
        if: always()
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          
          mega-mkdir /Radio_Nagrania || true
          mega-mkdir /Radio_Nagrania/Radio_Logi || true
          
          if [ -d "nagrania" ]; then
            for file in nagrania/*.mp3; do
              if [ -f "$file" ] && [ "$(stat -c%s "$file")" -gt 50000 ]; then
                echo "Uploading recording: $file..."
                mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
          fi
          
          if [ -d "logi" ]; then
            for file in logi/*.txt; do
              if [ -f "$file" ]; then
                echo "Uploading log: $file..."
                mega-put "$file" /Radio_Nagrania/Radio_Logi/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
          fi
          
          mega-logout > /dev/null || true