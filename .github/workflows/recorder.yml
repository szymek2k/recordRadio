name: Radio Park FM - ULTIMATE LOGGER (DYNAMIC)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Całkowity czas nagrywania (w sekundach)'
        required: false
        default: '10800'
      chunk:
        description: 'Długość jednego segmentu (w sekundach)'
        required: false
        default: '1800'
      retry_count:
        description: 'Aktualny numer próby restartu (wewnętrzne przekazywanie)'
        required: false
        default: '0'

permissions:
  actions: write
  contents: read

jobs:
  record:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    concurrency:
      group: radio-park-logger-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Smart recorder (MAIN PROCESS)
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"
          source scripts/mega_log_in.sh
          
          mkdir -p nagrania
          mkdir -p logi

          # --- INICJACJA ZBIORCZEGO PLIKU HISTORII Z DATĄ I GODZINĄ ---
          LOG_TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          HISTORIA="logi/historia_dzialania_${LOG_TIMESTAMP}.log"
          
          FFMPEG_PID=""

          # --- SYSTEMOWY PAS BEZPIECZEŃSTWA (TRAP) ---
          trap 'if [ -n "$FFMPEG_PID" ]; then kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true; wait "$FFMPEG_PID" 2>/dev/null || true; fi' EXIT TERM INT
          
          echo "=== START WORKFLOW: $(date '+%Y-%m-%d %H:%M:%S') ===" | tee "$HISTORIA"
          echo "Bieżący numer próby (retry_count): ${{ github.event.inputs.retry_count || '0' }}" | tee -a "$HISTORIA"
          
          echo "[$(date +'%H:%M:%S')] Próba logowania do MEGA..." | tee -a "$HISTORIA"
          ensure_mega_login 2>&1 | tee -a "$HISTORIA"
          mega-mkdir /Radio_Nagrania 2>&1 | tee -a "$HISTORIA" || true
          mega-mkdir /Radio_Nagrania/Radio_Logi 2>&1 | tee -a "$HISTORIA" || true
          
          # --- [IMPORT] AUTOMATYCZNE CZYSZCZENIE MEGA ---
          # bash scripts/clean_mega.sh "/Radio_Nagrania" "$HISTORIA"
          
          DURATION="${{ github.event.inputs.duration || '10800' }}"
          DEFAULT_CHUNK="${{ github.event.inputs.chunk || '1800' }}"
          
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + DURATION))
          i=0

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            CURRENT_TIME=$(date +%s)
            [ $((END_TIME - CURRENT_TIME)) -le 30 ] && break

            i=$((i + 1))
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            FILE="nagrania/Radio_${TIMESTAMP}.mp3"
            LOG_FILE="logi/Log_MAIN_${i}_${TIMESTAMP}.txt"

            REMAINING_TIME=$((END_TIME - CURRENT_TIME))
            CHUNK_TIME=$(( REMAINING_TIME < DEFAULT_CHUNK ? REMAINING_TIME : DEFAULT_CHUNK ))

            echo "[$(date +'%H:%M:%S')] Rozpoczynanie segmentu $i (max: ${CHUNK_TIME}s) -> $FILE" | tee -a "$LOG_FILE" "$HISTORIA"

            ffmpeg -y -hide_banner -loglevel warning -user_agent "Mozilla/5.0" \
              -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK_TIME" -c:a copy "$FILE" >"$LOG_FILE" 2>&1 &
          
            FFMPEG_PID=$!
            START_SEGMENT=$(date +%s)
            LAST_SIZE=0
            LAST_ACTIVE=$(date +%s)
            TICK=0

            while kill -0 "$FFMPEG_PID" 2>/dev/null; do
              NOW=$(date +%s)
          
              if [ $((NOW - START_SEGMENT)) -ge "$CHUNK_TIME" ]; then
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                break
              fi

              CURRENT_SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          
              if [ "$CURRENT_SIZE" -gt "$LAST_SIZE" ]; then
                LAST_SIZE=$CURRENT_SIZE
                LAST_ACTIVE="$NOW"
                TICK=$((TICK + 1))
                if [ $((TICK % 10)) -eq 0 ]; then
                  MBS=$(( CURRENT_SIZE / 1048576 ))
                  echo "[$(date +'%H:%M:%S')] Nagrywanie w toku, segment $i (rozmiar: $MBS MB)" | tee -a "$LOG_FILE" "$HISTORIA"
                fi
              elif [ $((NOW - LAST_ACTIVE)) -ge 180 ]; then
                echo "[$(date +'%H:%M:%S')] Brak danych przez 3 min! Restart procesu..." | tee -a "$LOG_FILE" "$HISTORIA"
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                sleep 10
                kill -9 "$FFMPEG_PID" 2>/dev/null || true
                break
              fi
              sleep 30
            done
          
            if wait "$FFMPEG_PID" || EXIT_CODE=$?; then
              STATUS="OK"
              echo "[$(date +'%H:%M:%S')] Segment $i zakończony poprawnie." | tee -a "$LOG_FILE" "$HISTORIA"
            else
              EXIT_CODE=$?
              STATUS="ERROR ($EXIT_CODE)"
              echo "[$(date +'%H:%M:%S')] ffmpeg zakończył się błędem (kod: $EXIT_CODE)." | tee -a "$LOG_FILE" "$HISTORIA"
            fi
          
            if [ -f "$FILE" ] && [ ! -s "$FILE" ]; then
              echo "[$(date +'%H:%M:%S')] Usuwam pusty plik: $FILE" | tee -a "$LOG_FILE" "$HISTORIA"
              rm -f "$FILE"
            fi
          
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            ZAKONCZONO=$(date '+%Y-%m-%d %H:%M:%S')
          
            echo "==================================================" | tee -a "$LOG_FILE" "$HISTORIA"
            echo "Segment: $i" | tee -a "$LOG_FILE" "$HISTORIA"
            echo "Status: $STATUS" | tee -a "$LOG_FILE" "$HISTORIA"
            echo "Plik: $FILE" | tee -a "$LOG_FILE" "$HISTORIA"
            echo "Rozmiar: $SIZE B" | tee -a "$LOG_FILE" "$HISTORIA"
            echo "Zakończono: $ZAKONCZONO" | tee -a "$LOG_FILE" "$HISTORIA"
            echo "==================================================" | tee -a "$LOG_FILE" "$HISTORIA"

            ensure_mega_login
          
            MP3_SUKCES=false
            LOG_SUKCES=false

            if [ -f "$FILE" ] && [ "$SIZE" -gt 50000 ]; then
              echo "[$(date +'%H:%M:%S')] [MEGA] Wysyłam segment $i..." | tee -a "$LOG_FILE" "$HISTORIA"
              if mega-put "$FILE" /Radio_Nagrania/ >> "$HISTORIA" 2>&1; then
                MP3_SUKCES=true
              else
                echo "[$(date +'%H:%M:%S')] Błąd wysyłania mp3." | tee -a "$LOG_FILE" "$HISTORIA"
              fi
            fi
          
            if [ -f "$LOG_FILE" ]; then
              if mega-put "$LOG_FILE" /Radio_Nagrania/Radio_Logi/ >> "$HISTORIA" 2>&1; then
                LOG_SUKCES=true
              else
                echo "[$(date +'%H:%M:%S')] Błąd wysyłania logow" | tee -a "$LOG_FILE" "$HISTORIA"
              fi
            fi

            echo "[$(date +'%H:%M:%S')] [MEGA] Aktualizacja zbiorczego pliku historii działania..." | tee -a "$LOG_FILE" "$HISTORIA"
            mega-put -c "$HISTORIA" /Radio_Nagrania/Radio_Logi/ >> /dev/null 2>&1 || mega-put "$HISTORIA" /Radio_Nagrania/Radio_Logi/ >> /dev/null 2>&1
          
            if [ "$MP3_SUKCES" = true ] && [ -f "$FILE" ]; then
              mkdir -p nagrania/wyslane
              mv "$FILE" nagrania/wyslane/
            fi

            if [ "$LOG_SUKCES" = true ] && [ -f "$LOG_FILE" ]; then
              mkdir -p logi/wyslane
              mv "$LOG_FILE" logi/wyslane/
            fi

            sleep 2
          done

          echo "=== KONIEC PRACY WORKFLOW: $(date '+%Y-%m-%d %H:%M:%S') ===" | tee -a "$HISTORIA"
          mega-logout >> "$HISTORIA" 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nagrania-tymczasowe
          path: |
            nagrania/
            logi/
          retention-days: 2
          compression-level: 0

      - name: Upload to MEGA (Fallback)
        if: always()
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          source scripts/mega_log_in.sh
          ensure_mega_login
          
          mega-mkdir /Radio_Nagrania || true
          mega-mkdir /Radio_Nagrania/Radio_Logi || true
          
          if [ -d "nagrania" ]; then
            for file in nagrania/*.mp3; do
              if [ -f "$file" ] && [ "$(stat -c%s "$file")" -gt 50000 ]; then
                echo "Uploading recording (fallback): $file..."
                mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
          fi
          
          if [ -d "logi" ]; then
            for file in logi/*.txt; do
              if [ -f "$file" ]; then
                echo "Uploading log (fallback): $file..."
                mega-put "$file" /Radio_Nagrania/Radio_Logi/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
            for h_file in logi/historia_dzialania_*.log; do
              if [ -f "$h_file" ]; then
                mega-put -c "$h_file" /Radio_Nagrania/Radio_Logi/ > /dev/null 2>&1 || true
              fi
            done
          fi
          
          mega-logout > /dev/null || true

  restart-on-failure:
    runs-on: ubuntu-22.04
    needs: record
    if: failure()
    steps:
      - name: Wait for 1 minute before retry
        run: |
          echo "Wykryto awarię głównego zadania nagrywającego."
          echo "Oczekiwanie 60 sekund przed próbą ponownego uruchomienia..."
          sleep 60

      - name: Install MEGA CMD for error logging
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Check retry limit, log error to MEGA and trigger new run
        env:
          GH_TOKEN: ${{ github.token }}
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"
          source scripts/mega_log_in.sh

          CURRENT_RETRY="${{ github.event.inputs.retry_count || '0' }}"
          MAX_RETRIES=3

          mkdir -p logi_awarii
          FAIL_TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          FAIL_FILE="logi_awarii/Awaria_Park_${FAIL_TIMESTAMP}.log"

          echo "==================================================" | tee "$FAIL_FILE"
          echo "RAPORT O AWARII WORKFLOW: Radio Park FM" | tee -a "$FAIL_FILE"
          echo "Data i godzina wykrycia: $(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$FAIL_FILE"
          echo "Status: Główny proces nagrywania (record) zakończył się niepowodzeniem." | tee -a "$FAIL_FILE"
          echo "ID nieudanego uruchomienia: ${{ github.run_id }}" | tee -a "$FAIL_FILE"
          echo "Link do logów GitHub: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" | tee -a "$FAIL_FILE"
          echo "Numer próby, przy której wystąpił błąd: $CURRENT_RETRY" | tee -a "$FAIL_FILE"
          echo "==================================================" | tee -a "$FAIL_FILE"

          if command -v mega-login &> /dev/null; then
            echo "Logowanie do MEGA w celu zapisu raportu awarii..."
            ensure_mega_login || echo "Błąd logowania do MEGA"
            mega-mkdir /Radio_Nagrania/Radio_Logi || true
            mega-put "$FAIL_FILE" /Radio_Nagrania/Radio_Logi/ || echo "Nie udało się wrzucić pliku"
            mega-logout > /dev/null || true
          else
            echo "[OSTRZEŻENIE] Instalacja MEGA CMD nie powiodła się. Pomijam chmurę, przechodzę do restartu."
          fi

          echo "Bieżąca liczba wykonanych restartów: $CURRENT_RETRY z maksymalnie $MAX_RETRIES"

          if [ "$CURRENT_RETRY" -ge "$MAX_RETRIES" ]; then
            echo "Osiągneto limit prób ($MAX_RETRIES). Przerywam automatyczne wznawianie."
            exit 0
          fi

          NEXT_RETRY=$((CURRENT_RETRY + 1))
          echo "Inicjowanie automatycznego restartu (Próba nr $NEXT_RETRY)..."
          
          gh workflow run "${{ github.workflow }}" \
            -f duration="${{ github.event.inputs.duration || '10800' }}" \
            -f chunk="${{ github.event.inputs.chunk || '1800' }}" \
            -f retry_count="$NEXT_RETRY"

          echo "Nowy proces workflow został zakolejkowany."