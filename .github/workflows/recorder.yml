name: Radio Park FM - ULTIMATE LOGGER (DYNAMIC)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Całkowity czas nagrywania (w sekundach)'
        required: false
        default: '10800'
      chunk:
        description: 'Długość jednego segmentu (w sekundach)'
        required: false
        default: '1800'
      retry_count:
        description: 'Aktualny numer próby restartu (wewnętrzne przekazywanie)'
        required: false
        default: '0'

# Wymagane uprawnienia dla wbudowanego narzędzia GitHub CLI (gh), aby móc wywołać restart workflow
permissions:
  actions: write
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-park-logger-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Smart recorder (MAIN PROCESS)
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"
          
          # --- LOGOWANIE DO MEGA NA STARCIE ---
          # Logujemy się od razu, aby móc wysyłać pliki natychmiast po nagraniu każdego segmentu.
          echo "Logowanie do MEGA..."
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania || true
          mega-mkdir /Radio_Nagrania/Radio_Logi || true
          
          DURATION="${{ github.event.inputs.duration || '10800' }}"
          DEFAULT_CHUNK="${{ github.event.inputs.chunk || '1800' }}"
          
          mkdir -p nagrania
          mkdir -p logi
          
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + DURATION))
          i=0

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            CURRENT_TIME=$(date +%s)
            [ $((END_TIME - CURRENT_TIME)) -le 30 ] && break

            i=$((i + 1))
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            FILE="nagrania/Radio_${TIMESTAMP}.mp3"
            LOG_FILE="logi/Log_MAIN_${i}_${TIMESTAMP}.txt"

            REMAINING_TIME=$((END_TIME - CURRENT_TIME))
            CHUNK_TIME=$(( REMAINING_TIME < DEFAULT_CHUNK ? REMAINING_TIME : DEFAULT_CHUNK ))

            echo "Segment $i -> $FILE (czas: ${CHUNK_TIME}s)"

            # Uruchomienie ffmpeg z limitem czasu -t
            ffmpeg -y -hide_banner -loglevel warning -user_agent "Mozilla/5.0" \
              -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK_TIME" -c:a copy "$FILE" >"$LOG_FILE" 2>&1 &
          
            FFMPEG_PID=$!
            START_SEGMENT=$(date +%s)
            LAST_SIZE=0
            LAST_ACTIVE=$(date +%s)
            TICK=0 

            while kill -0 "$FFMPEG_PID" 2>/dev/null; do
              NOW=$(date +%s)
          
              if [ $((NOW - START_SEGMENT)) -ge "$CHUNK_TIME" ]; then
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                break
              fi

              CURRENT_SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          
              if [ "$CURRENT_SIZE" -gt "$LAST_SIZE" ]; then
                LAST_SIZE=$CURRENT_SIZE
                LAST_ACTIVE="$NOW"
                TICK=$((TICK + 1))
                if [ $((TICK % 10)) -eq 0 ]; then
                  MBS=$(( CURRENT_SIZE / 1048576 ))
                  echo "[$(date +'%H:%M:%S')] Nagrywanie w toku, segment $i (rozmiar: $MBS MB)" | tee -a "$LOG_FILE"
                fi
              elif [ $((NOW - LAST_ACTIVE)) -ge 180 ]; then
                echo "[$(date +'%H:%M:%S')] Brak danych przez 3 min! Restart procesu..." | tee -a "$LOG_FILE"
                kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
                sleep 10
                kill -9 "$FFMPEG_PID" 2>/dev/null || true
                break
              fi
              sleep 30
            done
            if wait "$FFMPEG_PID"; then
              STATUS="OK"
              echo "[$(date +'%H:%M:%S')] Segment $i zakończony poprawnie." | tee -a "$LOG_FILE"
            else
              EXIT_CODE=$?
              STATUS="ERROR ($EXIT_CODE)"
              echo "[$(date +'%H:%M:%S')] ffmpeg zakończył się błędem (kod: $EXIT_CODE)." | tee -a "$LOG_FILE"
            fi
          
            # Usuń pusty plik jeśli powstał
            if [ -f "$FILE" ] && [ ! -s "$FILE" ]; then
              echo "[$(date +'%H:%M:%S')] Usuwam pusty plik: $FILE" | tee -a "$LOG_FILE"
              rm -f "$FILE"
            fi
          
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          
            echo "==================================================" | tee -a "$LOG_FILE"
            echo "Segment: $i" | tee -a "$LOG_FILE"
            echo "Status: $STATUS" | tee -a "$LOG_FILE"
            echo "Plik: $FILE" | tee -a "$LOG_FILE"
            echo "Rozmiar: $SIZE B" | tee -a "$LOG_FILE"
            echo "Zakończono: $(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$LOG_FILE"
            echo "==================================================" | tee -a "$LOG_FILE"

            # --- OCHRONA PRZED AWARIĄ RUNNERA (WYSYŁKA NA BIEŻĄCO) ---
            # Jeśli segment został pomyślnie nagrany, przerzucamy go na MEGA bezpośrednio w pętli.
            if [ -f "$FILE" ] && [ "$SIZE" -gt 50000 ]; then
              echo "[$(date +'%H:%M:%S')] [MEGA] Wysyłam bezpiecznie gotowy segment $i..."
              mega-put "$FILE" /Radio_Nagrania/ || echo "Błąd bezpośredniego wysyłania segmentu"
              rm -f "$FILE" # Czyszczenie dysku wirtualnego, chroni przed zapełnieniem zasobów
            fi

            # Wysyłka powiązanego pliku logu
            if [ -f "$LOG_FILE" ]; then
              mega-put "$LOG_FILE" /Radio_Nagrania/Radio_Logi/ || echo "Błąd bezpośredniego wysyłania logu"
            fi
            # --------------------------------------------------------
          
            sleep 2
          done

          mega-logout > /dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nagrania-tymczasowe
          path: |
            nagrania/
            logi/
          retention-days: 2

      # Krok Fallback: Bezpiecznik. Uruchamia się na samym końcu tylko dla plików,
      # które mogły pozostać na dysku przy prawidłowym zakończeniu pętli głównej.
      - name: Upload to MEGA (Fallback)
        if: always()
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-session > /dev/null 2>&1 || mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          
          mega-mkdir /Radio_Nagrania || true
          mega-mkdir /Radio_Nagrania/Radio_Logi || true
          
          if [ -d "nagrania" ]; then
            for file in nagrania/*.mp3; do
              if [ -f "$file" ] && [ "$(stat -c%s "$file")" -gt 50000 ]; then
                echo "Uploading recording (fallback): $file..."
                mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
          fi
          
          if [ -d "logi" ]; then
            for file in logi/*.txt; do
              if [ -f "$file" ]; then
                echo "Uploading log (fallback): $file..."
                mega-put "$file" /Radio_Nagrania/Radio_Logi/ > /dev/null || echo "Błąd wysyłania: $file"
              fi
            done
          fi
          
          mega-logout > /dev/null || true

  # --- AUTOMATYCZNY RESTART W PRZYPADKU AWARII RUNNERA ---
  # Zadanie odpali się na świeżej maszynie tylko wtedy, gdy zadanie 'record' padnie.
  restart-on-failure:
    runs-on: ubuntu-latest
    needs: record
    if: failure()
    steps:
      # Krok 1: Odczekanie 1 minuty przed podjęciem działań restartujących
      - name: Wait for 1 minute before retry
        run: |
          echo "Wykryto awarię głównego zadania nagrywającego."
          echo "Oczekiwanie 60 sekund na ustabilizowanie infrastruktury/strumienia..."
          sleep 60

      # Krok 2: Ewaluacja licznika pętli i wywołanie nowej sesji workflow przez CLI
      - name: Check retry limit and trigger new run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pobranie aktualnego stanu próby (domyślnie 0 przy ręcznym startowaniu)
          CURRENT_RETRY="${{ github.event.inputs.retry_count || '0' }}"
          MAX_RETRIES=3

          echo "Bieżąca liczba automatycznych restartów: $CURRENT_RETRY z maksymalnie $MAX_RETRIES"

          # Sprawdzenie warunku blokady: jeśli to już 3 awaria z rzędu, przerywamy automatyzację
          if [ "$CURRENT_RETRY" -ge "$MAX_RETRIES" ]; then
            echo "Osiągnięto limit prób ($MAX_RETRIES). Kończę automatyczne wznawianie w celu uniknięcia nieskończonej pętli."
            exit 0
          fi

          # Kalkulacja numeru kolejnej próby
          NEXT_RETRY=$((CURRENT_RETRY + 1))
          echo "Inicjowanie próby automatycznego restartu nr $NEXT_RETRY..."
          
          # UWAGA: Upewnij się, że nazwa pliku poniżej (radio_park.yml) 
          # odpowiada dokładnej nazwie tego pliku .yml w Twoim repozytorium!
          gh workflow run recorder.yml \
            -f duration="${{ github.event.inputs.duration || '10800' }}" \
            -f chunk="${{ github.event.inputs.chunk || '1800' }}" \
            -f retry_count="$NEXT_RETRY"

          echo "Nowy proces workflow (Próba: $NEXT_RETRY) został pomyślnie zakolejkowany przez GitHub API."