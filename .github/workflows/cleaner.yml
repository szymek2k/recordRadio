name: Auto Clean Old Workflows

on:
  schedule:
    # Odpalaj codziennie o 03:00 w nocy
    - cron: '0 3 * * *'
  workflow_dispatch: # Pozwala na ręczne uruchomienie przyciskiem w zakładce Actions

permissions:
  actions: write # Krytyczne uprawnienie do usuwania logów

jobs:
  clean-history:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- KROK 1: Czyszczenie logów historii GitHub Actions ---
      - name: Run cleaner script (GitHub Logs)
        env:
          GH_TOKEN: ${{ github.token }} # Przekazanie tokenu autoryzacji do GitHub CLI
        run: |
          chmod +x scripts/clean_old_workflows.sh
          bash scripts/clean_old_workflows.sh

      # --- KROK 2: Instalacja MEGA CMD (Zabezpieczona przed błędami) ---
      - name: Install MEGA CMD
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      # --- KROK 3: Wywołanie skryptu czyszczącego (Audio + Logi) dla obu lokalizacji ---
      - name: Clean MEGA Storage (Audio & Logs)
        continue-on-error: true
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"
          source scripts/mega_log_in.sh
          
          # Inicjalizacja pliku logu z bieżącego uruchomienia
          mkdir -p logi
          LOG_TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          HISTORIA="logi/historia_czyszczenia_mega_${LOG_TIMESTAMP}.log"
          
          echo "=== START AUTOMATYCZNEGO SPRZĄTANIA MEGA: $(date '+%Y-%m-%d %H:%M:%S') ===" | tee "$HISTORIA"
          
          echo "[$(date +'%H:%M:%S')] Logowanie do usługi MEGA..." | tee -a "$HISTORIA"
          ensure_mega_login 2>&1 | tee -a "$HISTORIA"
          
          # Pętla czyszcząca oba foldery jeden po drugim
          for FOLDER in "/Radio_Nagrania" "/Radio_Fest_Nagrania"; do
            echo "[$(date +'%H:%M:%S')] Rozpoczynam głębokie czyszczenie folderu (nagrania + logi): $FOLDER" | tee -a "$HISTORIA"
            bash scripts/clean_mega.sh "$FOLDER" "$HISTORIA" || true
          done
          
          # Dynamiczne wrzucenie zbiorczego logu do odpowiednich podfolderów obu stacji
          echo "[$(date +'%H:%M:%S')] Wysyłanie raportu z czyszczenia na MEGA..." | tee -a "$HISTORIA"
          for FOLDER in "/Radio_Nagrania" "/Radio_Fest_Nagrania"; do
            mega-mkdir "$FOLDER/Radio_Logi" 2>&1 || true
            mega-put "$HISTORIA" "$FOLDER/Radio_Logi/" || true
          done
          
          echo "=== KONIEC PRACY WORKFLOW SPRZĄTAJĄCEGO ===" | tee -a "$HISTORIA"
          mega-logout > /dev/null 2>&1 || true