name: Record Radio Park FM

on:
  schedule:
    # Główny blok: pt, sob, nd, pon od 17:00 PL (15:00 UTC)
    - cron: '0 15 * * 5,6,0,1'   # 17:00 PL
    - cron: '30 16 * * 5,6,0,1'  # 18:30 PL
    - cron: '0 18 * * 5,6,0,1'   # 20:00 PL
    - cron: '30 19 * * 5,6,0,1'  # 21:30 PL
    - cron: '0 21 * * 5,6,0,1'   # 23:00 PL
    - cron: '30 22 * * 5,6,0,1'  # 00:30 PL
    - cron: '0 0 * * 6,0,1,2'    # 02:00 PL
    
    # NOWOŚĆ: Niedziela, godzina 14:10 czasu PL -> 12:10 UTC
    - cron: '10 12 * * 0'

  workflow_dispatch:

jobs:
  record_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ffmpeg & mega-cmd)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo wget -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y /var/tmp/megacmd.deb

      - name: Record Radio Stream
        run: |
          # Pobranie aktualnej godziny i dnia tygodnia w strefie PL
          CURRENT_HOUR=$(TZ="Europe/Warsaw" date +"%H:%M")
          CURRENT_DAY=$(TZ="Europe/Warsaw" date +"%u") # 7 to niedziela
          
          # Generowanie nazwy pliku
          TIMESTAMP=$(TZ="Europe/Warsaw" date +"%Y-%m-%d_%H-%M")
          FILENAME="Radio_Park_${TIMESTAMP}.mp3"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          
          STREAM_URL="https://sluchaj2.radiopark.biz.pl:8443/stream"
          
          # Domyślny czas nagrywania: 5400 sekund (1.5 godziny)
          RECORD_DURATION=5400
          
          # Jeśli jest niedziela (7) i godzina rozpoczęcia to 14:10, zmieniamy czas na 10 minut (600 sekund)
          if [ "$CURRENT_DAY" = "7" ] && [ "$CURRENT_HOUR" = "14:10" ]; then
            echo "Wykryto okienko niedzielne. Ustawiam nagrywanie na 10 minut."
            RECORD_DURATION=600
          fi
          
          echo "Rozpoczynam nagrywanie ($RECORD_DURATION sekund): $FILENAME"
          ffmpeg -i "$STREAM_URL" -t $RECORD_DURATION -c:a libmp3lame -b:a 128k "$FILENAME"

      - name: Upload to MEGA.io
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD"
          mega-mkdir /Radio_Nagrania || true
          mega-put "$FILENAME" /Radio_Nagrania/
          mega-logout
