name: Radio Park FM - ULTIMATE LOGGER (FIXED)

on:
  schedule:
    - cron: '50 13 * * 5,6,0'
    - cron: '50 16 * * 5,6,0'
    - cron: '50 19 * * 5,6,0'
    - cron: '50 22 * * 5,6,0'
    - cron: '50 14 * * 1'
    - cron: '50 17 * * 1'
    - cron: '50 20 * * 1'
  workflow_dispatch:

jobs:
  # =========================================================================
  # 1. PROCES GŁÓWNY (Czeka na równą godzinę, działa 3 godziny)
  # =========================================================================
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-logger-main
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget lsb-release
          UBUNTU=$(lsb_release -rs)
          wget -q -O /tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_${UBUNTU}/amd64/megacmd-xUbuntu_${UBUNTU}_amd64.deb \
            || wget -q -O /tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /tmp/megacmd.deb

      - name: Recorder (MAIN PROCESS)
        run: |
          set -euo pipefail
          export TZ=Europe/Warsaw

          PLANNED_MINUTES_UTC=(830 890 1010 1070 1190 1250 1370)
          CURR_H_UTC=$(date -u +%H)
          CURR_M_UTC=$(date -u +%M)
          NOW_IN_MINS_UTC=$((10#$CURR_H_UTC*60+10#$CURR_M_UTC))

          BEST_MATCH=""
          MIN_DIFF=999999
          for item in "${PLANNED_MINUTES_UTC[@]}"; do
            DIFF=$((NOW_IN_MINS_UTC-item))
            [ "$DIFF" -lt -720 ] && DIFF=$((DIFF+1440))
            [ "$DIFF" -gt 720 ] && DIFF=$((DIFF-1440))
            if [ "$DIFF" -ge 0 ] && [ "$DIFF" -lt "$MIN_DIFF" ]; then
              MIN_DIFF=$DIFF
              BEST_MATCH=$item
            fi
          done
          [ -z "$BEST_MATCH" ] && { echo "No cron match"; exit 1; }

          CRON_H=$((BEST_MATCH/60))
          CRON_M=$((BEST_MATCH%60))
          CURRENT_SECS=$(date +%s)
          TARGET_START_SECS=$(date -d "$(date -u +%F) ${CRON_H}:${CRON_M}:00 UTC" +%s)
          TARGET_START_SECS=$((TARGET_START_SECS+600))
          SLEEP_SECS=$((TARGET_START_SECS-CURRENT_SECS))
          
          if [ "$SLEEP_SECS" -gt 0 ]; then
            echo "[MAIN] Czekam dynamicznie przez ${SLEEP_SECS} s..."
            sleep "$SLEEP_SECS"
          fi

          mkdir -p nagrania
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          END=$(( $(date +%s)+10800 ))

          while [ "$(date +%s)" -lt "$END" ]; do
            REM=$((END-$(date +%s)))
            [ "$REM" -le 5 ] && break
            CHUNK=1800
            [ "$REM" -lt 1800 ] && CHUNK=$REM
            
            ffmpeg -y -loglevel error \
              -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -reconnect 1 \
              -reconnect_streamed 1 \
              -reconnect_at_eof 1 \
              -reconnect_on_network_error 1 \
              -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK" -c:a copy \
              "nagrania/Radio_$(date +%F_%H-%M-%S).mp3" || true
            
            sleep $((RANDOM%5+2))
          done

      - name: Upload Main to MEGA
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania || true
          shopt -s nullglob
          for file in nagrania/*.mp3; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Upload failed for $file, skipping."
            fi
          done
          mega-logout > /dev/null

  # =========================================================================
  # 2. PROCES ZABEZPIECZAJĄCY (Czeka dłużej, nagrywa 1h 20 min)
  # =========================================================================
  backup-record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-logger-backup
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget lsb-release
          UBUNTU=$(lsb_release -rs)
          wget -q -O /tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_${UBUNTU}/amd64/megacmd-xUbuntu_${UBUNTU}_amd64.deb \
            || wget -q -O /tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /tmp/megacmd.deb

      - name: Recorder (BACKUP PROCESS)
        run: |
          set -euo pipefail
          export TZ=Europe/Warsaw

          PLANNED_MINUTES_UTC=(830 890 1010 1070 1190 1250 1370)
          CURR_H_UTC=$(date -u +%H)
          CURR_M_UTC=$(date -u +%M)
          NOW_IN_MINS_UTC=$((10#$CURR_H_UTC*60+10#$CURR_M_UTC))

          BEST_MATCH=""
          MIN_DIFF=999999
          for item in "${PLANNED_MINUTES_UTC[@]}"; do
            DIFF=$((NOW_IN_MINS_UTC-item))
            [ "$DIFF" -lt -720 ] && DIFF=$((DIFF+1440))
            [ "$DIFF" -gt 720 ] && DIFF=$((DIFF-1440))
            if [ "$DIFF" -ge 0 ] && [ "$DIFF" -lt "$MIN_DIFF" ]; then
              MIN_DIFF=$DIFF
              BEST_MATCH=$item
            fi
          done
          [ -z "$BEST_MATCH" ] && { echo "No cron match"; exit 1; }

          CRON_H=$((BEST_MATCH/60))
          CRON_M=$((BEST_MATCH%60))
          CURRENT_SECS=$(date +%s)
          TARGET_START_SECS=$(date -d "$(date -u +%F) ${CRON_H}:${CRON_M}:00 UTC" +%s)
          TARGET_START_SECS=$((TARGET_START_SECS+8400)) # Okno backupu (+2h 20m)
          SLEEP_SECS=$((TARGET_START_SECS-CURRENT_SECS))
          
          if [ "$SLEEP_SECS" -gt 0 ]; then
            echo "[BACKUP] Czekam dynamicznie przez ${SLEEP_SECS} s..."
            sleep "$SLEEP_SECS"
          fi

          mkdir -p nagrania_backup
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"
          END=$(( $(date +%s)+4800 )) # Czas trwania: 1 godzina 20 minut

          while [ "$(date +%s)" -lt "$END" ]; do
            REM=$((END-$(date +%s)))
            [ "$REM" -le 5 ] && break
            CHUNK=1800
            [ "$REM" -lt 1800 ] && CHUNK=$REM
            
            ffmpeg -y -loglevel error \
              -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -reconnect 1 \
              -reconnect_streamed 1 \
              -reconnect_at_eof 1 \
              -reconnect_on_network_error 1 \
              -reconnect_delay_max 5 \
              -i "$STREAM" -t "$CHUNK" -c:a copy \
              "nagrania_backup/Radio_$(date +%F_%H-%M-%S)_BACKUP.mp3" || true
            
            sleep $((RANDOM%5+2))
          done

      - name: Upload Backup to MEGA
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania || true
          shopt -s nullglob
          for file in nagrania_backup/*.mp3; do
            if [ -f "$file" ]; then
              echo "Uploading Backup: $file..."
              mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Upload failed for $file, skipping."
            fi
          done
          mega-logout > /dev/null
