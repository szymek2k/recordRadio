name: Radio Park FM - ULTIMATE LOGGER (FIXED & TESTED)

on:
  schedule:
    - cron: '50 13 * * 5,6,0'
    - cron: '50 16 * * 5,6,0'
    - cron: '50 19 * * 5,6,0'
    - cron: '50 22 * * 5,6,0'
    - cron: '50 14 * * 1'
    - cron: '50 17 * * 1'
    - cron: '50 20 * * 1'
  workflow_dispatch:

jobs:
  # =========================================================================
  # 1. PROCES GŁÓWNY (Działa od razu przez 3 godziny, tnie pliki co 30 minut)
  # =========================================================================
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-logger-main-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Smart recorder (MAIN PROCESS)
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"

          DURATION=10800 # 3 godziny
          mkdir -p nagrania
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"

          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + DURATION))
          i=0

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            CURRENT_TIME=$(date +%s)
            REMAINING_TIME=$((END_TIME - CURRENT_TIME))

            if [ "$REMAINING_TIME" -le 5 ]; then
              break
            fi

            i=$((i+1))
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            FILE="nagrania/Radio_${TIMESTAMP}.mp3"

            CHUNK_TIME=1800
            if [ "$REMAINING_TIME" -lt 1800 ]; then
              CHUNK_TIME=$REMAINING_TIME
            fi

            echo "Segment MAIN $i -> $FILE (czas trwania: ${CHUNK_TIME}s)"

            ffmpeg \
              -y \
              -loglevel error \
              -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -reconnect 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 5 \
              -i "$STREAM" \
              -t "$CHUNK_TIME" \
              -c:a copy \
              "$FILE" || echo "Stream interrupted, re-connecting..."

            sleep $((RANDOM % 5 + 2))
          done

          echo "RECORDING MAIN DONE"

      - name: Upload Main to MEGA
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania || true
          
          shopt -s nullglob
          for file in nagrania/*.mp3; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Upload failed for $file, skipping to next."
            fi
          done
          mega-logout > /dev/null

  # =========================================================================
  # 2. PROCES ZABEZPIECZAJĄCY (Inteligentny dynamiczny sleep + segmentacja)
  # =========================================================================
  backup-record:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: radio-logger-backup-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          sudo wget -q -O /var/tmp/megacmd.deb https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt-get install -y -qq /var/tmp/megacmd.deb

      - name: Wait for backup window and record (BACKUP PROCESS)
        run: |
          set -euo pipefail
          export TZ="Europe/Warsaw"

          CURRENT_SECS=$(date +%s)
          
          # Definiujemy planowane godziny startu cronów w minutach od północy (czas PL)
          # 13:50->830, 14:50->890, 16:50->1010, 17:50->1070, 19:50->1190, 20:50->1250, 22:50->1370
          PLANNED_MINUTES=(830 890 1010 1070 1190 1250 1370)
          
          CURR_H=$(date +"%H")
          CURR_M=$(date +"%M")
          NOW_IN_MINS=$(( 10#$CURR_H * 60 + 10#$CURR_M ))

          BEST_MATCH=${PLANNED_MINUTES[0]}
          MIN_DIFF=9999

          for item in "${PLANNED_MINUTES[@]}"; do
            DIFF=$(( NOW_IN_MINS - item ))
            # Szukamy crona, który planowo miał ruszyć nie dawniej niż 120 minut temu
            if [ "$DIFF" -ge 0 ] && [ "$DIFF" -lt "$MIN_DIFF" ] && [ "$DIFF" -lt 120 ]; then
              MIN_DIFF=$DIFF
              BEST_MATCH=$item
            fi
          done

          # Obliczamy docelowy czas startu backupu (zawsze dokładnie 140 minut po PLANOWANYM cronie)
          START_OF_DAY_SECS=$(date -d "00:00:00" +%s)
          TARGET_START_SECS=$(( START_OF_DAY_SECS + (BEST_MATCH * 60) + 8400 ))

          # Dynamiczny obliczony sleep
          SLEEP_SECS=$(( TARGET_START_SECS - CURRENT_SECS ))

          if [ "$SLEEP_SECS" -gt 0 ]; then
            echo "Wykryto planowany cron o godzinie $((BEST_MATCH / 60)):$((BEST_MATCH % 60))"
            echo "GitHub opóźnił start o: $(( MIN_DIFF )) min."
            echo "Czekam dynamicznie przez ${SLEEP_SECS} sekund..."
            sleep "$SLEEP_SECS"
          else
            echo "Opóźnienie GitHuba przekroczyło okno zakładki ($(( MIN_DIFF )) min). Start natychmiastowy!"
          fi

          # Rozpoczęcie nagrywania z podziałem na części
          DURATION=4800 # 1 godzina 20 minut
          mkdir -p nagrania_backup
          STREAM="https://sluchaj2.radiopark.biz.pl:8443/stream"

          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + DURATION))
          i=0

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            CURRENT_TIME=$(date +%s)
            REMAINING_TIME=$((END_TIME - CURRENT_TIME))

            if [ "$REMAINING_TIME" -le 5 ]; then
              break
            fi

            i=$((i+1))
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            # Adnotacja _BACKUP w nazwie pliku
            FILE="nagrania_backup/Radio_${TIMESTAMP}_BACKUP.mp3"

            CHUNK_TIME=1800
            if [ "$REMAINING_TIME" -lt 1800 ]; then
              CHUNK_TIME=$REMAINING_TIME
            fi

            echo "Segment BACKUP $i -> $FILE (czas trwania: ${CHUNK_TIME}s)"

            ffmpeg \
              -y \
              -loglevel error \
              -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -reconnect 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 5 \
              -i "$STREAM" \
              -t "$CHUNK_TIME" \
              -c:a copy \
              "$FILE" || echo "Stream interrupted, re-connecting..."

            sleep $((RANDOM % 5 + 2))
          done

          echo "RECORDING BACKUP DONE"

      - name: Upload Backup to MEGA
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD" > /dev/null
          mega-mkdir /Radio_Nagrania || true

          shopt -s nullglob
          for file in nagrania_backup/*.mp3; do
            if [ -f "$file" ]; then
              echo "Uploading Backup: $file..."
              mega-put "$file" /Radio_Nagrania/ > /dev/null || echo "Upload failed for $file, skipping to next."
            fi
          done
          mega-logout > /dev/null
